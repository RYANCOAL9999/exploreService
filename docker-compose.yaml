version: '3.8'

services:
  # PostgreSQL database container
  postgres:
    image: postgres:16.2-alpine
    container_name: explore_postgres
    restart: always
    environment:
      POSTGRES_DB: explore_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: mysecretpassword
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d explore_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app-network
  
  # 💡 Added: Your Go gRPC Service container
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: explore_service
    restart: always
    ports:
      - "50051:50051"
    environment:
      - PORT=50051
      # 💡 Dynamic DSN pointing to the 'postgres' container service
      - DB=host=postgres user=postgres password=mysecretpassword dbname=explore_db port=5432 sslmode=disable TimeZone=UTC
    depends_on:
      postgres:
        condition: service_healthy # Only start app when postgres is fully ready
      otel-collector:
        condition: service_started
    networks:
      - app-network

  # 💡 OpenTelemetry Collector
  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: otel_collector
    restart: always
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./otel-collector-config.yaml:/etc/otel-collector-config.yaml
      # ❌ There's absolutely no need to expose any ports to external hosts here; everything is interconnected within the Docker intranet.
    networks:
      - app-network
    depends_on:
      - db

  # 💡 Prometheus Time Series Database
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus_server
    restart: always
    ports:
      - "9090:9090" # Access http://localhost:9090 in your browser to view the monitoring status.
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - app-network
    depends_on:
      - otel-collector

  # 💡 Grafana Visualization Panel
  grafana:
    image: grafana/grafana:latest
    container_name: grafana_server
    restart: always
    ports:
      - "3000:3000" # View the chart by accessing http://localhost:3000 in your browser.
    volumes:
      - grafana_data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin # Default administrator password (Recommended for production environment changes)
    networks:
      - app-network
    depends_on:
      - prometheus

networks:
  app-network:
    driver: bridge

volumes:
  postgres_data:
  prometheus_data:
  grafana_data: