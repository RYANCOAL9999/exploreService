version: '3.8'

services:
  # PostgreSQL database container
  postgres:
    image: postgres:16.2-alpine
    container_name: explore_postgres
    restart: always
    environment:
      POSTGRES_DB: explore_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: mysecretpassword
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d explore_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  # 💡 Added: Your Go gRPC Service container
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: explore_service
    restart: always
    ports:
      - "50051:50051"
    environment:
      - PORT=50051
      # 💡 Dynamic DSN pointing to the 'postgres' container service
      - DB=host=postgres user=postgres password=mysecretpassword dbname=explore_db port=5432 sslmode=disable TimeZone=UTC
    depends_on:
      postgres:
        condition: service_healthy # Only start app when postgres is fully ready
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  postgres_data: